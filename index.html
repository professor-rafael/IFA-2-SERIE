<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Quiz: Acessibilidade no Colégio Estadual Rio Branco</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1e8c3c 0%, #145c28 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* CORPO COM BACKGROUND DE IMAGEM */
        body {
            background: linear-gradient(rgba(30, 140, 60, 0.85), rgba(20, 92, 40, 0.9)), url('debg-sktop.webp');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .caixa-principal {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 950px;
            width: 100%;
            padding: 24px;
            transition: all 0.3s ease;
        }

        @media (max-width: 600px) {
            .caixa-principal {
                padding: 16px;
                border-radius: 20px;
            }
        }

        .cabecalho {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 3px solid #1e8c3c;
            padding-bottom: 12px;
        }

        .cabecalho h1 {
            color: #1e8c3c;
            font-size: clamp(1.3rem, 5vw, 1.8rem);
            margin-bottom: 5px;
        }

        .cabecalho p {
            color: #2d3748;
            font-size: clamp(0.8rem, 3vw, 0.9rem);
        }

        .relogio {
            background: #2d3748;
            color: white;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            font-size: clamp(1.2rem, 5vw, 1.6rem);
            font-weight: bold;
            font-family: monospace;
        }

        .relogio span {
            background: #1a202c;
            padding: 6px 12px;
            border-radius: 10px;
            margin: 0 4px;
            display: inline-block;
            min-width: 55px;
        }

        @media (max-width: 480px) {
            .relogio span {
                padding: 4px 8px;
                min-width: 45px;
                font-size: 1rem;
            }
        }

        .info-quiz {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #e8f5e9;
            border-radius: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .pontuacao-atual, .questao-numero {
            font-weight: bold;
            color: #1e8c3c;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
        }

        .progresso {
            background: #e2e8f0;
            border-radius: 10px;
            height: 12px;
            margin-bottom: 25px;
            overflow: hidden;
        }

        .progresso-bar {
            background: #1e8c3c;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .caixa-perguntas {
            background: #f7fafc;
            padding: 20px;
            border-radius: 20px;
            font-size: clamp(1rem, 4vw, 1.25rem);
            line-height: 1.5;
            color: #2d3748;
            margin-bottom: 25px;
            border-left: 5px solid #1e8c3c;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .caixa-perguntas {
                padding: 15px;
                border-left-width: 3px;
            }
        }

        .caixa-alternativas {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 25px;
        }

        .alternativa {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            border: 2px solid #e2e8f0;
            padding: 12px 16px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .alternativa:focus-visible {
            outline: 3px solid #1e8c3c;
            outline-offset: 2px;
            transform: scale(1.01);
        }

        @media (max-width: 480px) {
            .alternativa {
                padding: 10px 12px;
                gap: 10px;
            }
        }

        .alternativa:hover:not(.disabled) {
            background: #f0fdf4;
            border-color: #1e8c3c;
            transform: translateX(5px);
        }

        .alternativa.selecionada {
            background: #1e8c3c;
            border-color: #1e8c3c;
            color: white;
        }

        .alternativa.errada {
            background: #f56565;
            border-color: #f56565;
            color: white;
        }

        .alternativa.disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        .alternativa-letra {
            font-weight: bold;
            font-size: clamp(1rem, 4vw, 1.2rem);
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e2e8f0;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .alternativa.selecionada .alternativa-letra,
        .alternativa.errada .alternativa-letra {
            background: rgba(255, 255, 255, 0.3);
            color: white;
        }

        .alternativa-texto {
            flex: 1;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            line-height: 1.4;
        }

        .btn-proximo {
            background: #1e8c3c;
            color: white;
            border: none;
            padding: 14px 20px;
            font-size: clamp(1rem, 4vw, 1.1rem);
            font-weight: bold;
            text-align: center;
            width: 100%;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-proximo:focus-visible {
            outline: 3px solid #ffd966;
            outline-offset: 2px;
        }

        .btn-proximo:hover:not(:disabled) {
            background: #166534;
            transform: translateY(-2px);
        }

        .btn-proximo:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 15px;
            padding: 12px 15px;
            border-radius: 12px;
            font-size: clamp(0.85rem, 3.5vw, 0.95rem);
            animation: fadeIn 0.3s ease;
        }

        .feedback-certo {
            background: #c6f6d5;
            color: #22543d;
            border-left: 4px solid #48bb78;
        }

        .feedback-errado {
            background: #fed7d7;
            color: #742a2a;
            border-left: 4px solid #f56565;
        }

        .caixa-resultado {
            text-align: center;
        }

        .texto-resultado {
            background: #edf2f7;
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: clamp(0.85rem, 3.5vw, 1rem);
            line-height: 1.6;
            color: #2d3748;
            text-align: left;
            max-height: 450px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .nota {
            font-size: clamp(2rem, 8vw, 3rem);
            font-weight: bold;
            color: #1e8c3c;
            margin: 20px 0;
        }

        .btn-reiniciar {
            background: #1e8c3c;
            color: white;
            border: none;
            padding: 14px 25px;
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            width: 100%;
            max-width: 280px;
        }

        .btn-reiniciar:focus-visible {
            outline: 3px solid #ffd966;
            outline-offset: 2px;
        }

        .btn-reiniciar:hover {
            background: #166534;
            transform: translateY(-2px);
        }

        footer {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        footer a {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            transition: transform 0.2s ease;
        }

        footer a:focus-visible {
            outline: 2px solid #1e8c3c;
            border-radius: 8px;
        }

        footer a:hover {
            transform: translateY(-3px);
        }

        footer img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        @media (max-width: 480px) {
            footer img {
                width: 32px;
                height: 32px;
            }
        }

        footer p {
            margin-top: 5px;
            color: #2d3748;
            font-size: 0.75rem;
            font-weight: 600;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #e2e8f0;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #1e8c3c;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="caixa-principal" role="main">
        <div class="cabecalho">
            <h1>🏫 Colégio Estadual Rio Branco</h1>
            <p>Quiz sobre Acessibilidade e Inclusão</p>
            <link rel="icon" href="icon.png">
        </div>

        <div class="relogio" aria-live="polite" aria-label="Relógio mostrando a hora atual">
            <span id="horas">00</span> :
            <span id="minutos">00</span> :
            <span id="segundos">00</span>
        </div>

        <div class="info-quiz">
            <span class="questao-numero" id="questaoNumero" aria-live="polite">Questão 1/10</span>
            <span class="pontuacao-atual" id="pontuacaoAtual" aria-live="polite">🎯 Acertos: 0</span>
        </div>

        <div class="progresso" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="progressoBarWrapper">
            <div class="progresso-bar" id="progressoBar"></div>
        </div>

        <div class="caixa-perguntas" id="caixaPerguntas" aria-live="polite"></div>
        
        <div class="caixa-alternativas" id="caixaAlternativas" role="group" aria-label="Opções de resposta"></div>
        
        <button class="btn-proximo" id="btnProximo" disabled aria-label="Próxima questão ou verificar resposta">PRÓXIMA QUESTÃO →</button>
        
        <div class="caixa-resultado" id="caixaResultado" style="display: none;" aria-live="polite">
            <div class="texto-resultado" id="textoResultado" tabindex="0"></div>
            <div class="nota" id="notaFinal"></div>
            <button class="btn-reiniciar" id="btnReiniciar" aria-label="Reiniciar o quiz">🔄 REINICIAR QUIZ</button>
        </div>

        <footer>
            <a href="https://github.com/professor-rafael" target="_blank" rel="noopener noreferrer" aria-label="GitHub do professor Rafael">
                <img src="github.png" alt="Logo do GitHub">
                <p>Github</p>
            </a>
            <a href="https://canva.link/irtwmovt8wgn3bk" target="_blank" rel="noopener noreferrer" aria-label="Link para o Canva">
                <img src="palette.png" alt="Logo do Canva">
                <p>Canva</p>
            </a>
            <a href="https://docs.google.com/forms/d/1e8Q0V22EgUXEXzCME82jb0597y6YjBzHFdoeBzobVDE/edit#question=1089937116&field=1226936784" target="_blank" rel="noopener noreferrer" aria-label="Link para o Canva">
                <img src="google-forms.png" alt="Logo do Google forms">
                <p>Google Forms</p>
            </a>
            <a href="https://www.deepseek.com/" target="_blank" rel="noopener noreferrer" aria-label="Link para o Deepseek">
                <img src="deepseek-color.png" alt="Logo do Deepseek">
                <p>Deepseek</p>
            </a>
        </footer>
    </div>

    <script>
        const perguntas = [
            {
                enunciado: "Quantos alunos com deficiência (PcD) estão matriculados atualmente no Colégio Estadual Rio Branco?",
                alternativas: [
                    { texto: "Nenhum aluno", correta: false },
                    { texto: "Entre 1 e 10 alunos", correta: true },
                    { texto: "Entre 11 e 30 alunos", correta: false },
                    { texto: "Mais de 50 alunos", correta: false }
                ],
                explicacao: "De acordo com dados do censo escolar, o Colégio Estadual Rio Branco possui aproximadamente 10 alunos com algum tipo de deficiência matriculados."
            },
            {
                enunciado: "Quantas rampas de acesso existem no Colégio Estadual Rio Branco para garantir acessibilidade?",
                alternativas: [
                    { texto: "Nenhuma rampa", correta: false },
                    { texto: "1 a 3 rampas", correta: false },
                    { texto: "4 a 7 rampas", correta: true },
                    { texto: "Mais de 10 rampas", correta: false }
                ],
                explicacao: "O colégio possui 4 rampas de acesso distribuídas nas entradas principais e entre os blocos de sala."
            },
            {
                enunciado: "Qual o tipo de deficiência mais comum entre os alunos do Colégio Estadual Rio Branco?",
                alternativas: [
                    { texto: "Deficiência visual (cegueira/baixa visão)", correta: false },
                    { texto: "Deficiência intelectual", correta: true },
                    { texto: "Deficiência física (motora)", correta: false },
                    { texto: "Deficiência auditiva (surdez)", correta: false }
                ],
                explicacao: "A deficiência intelectual é a mais prevalente, representando cerca de 40% dos alunos com necessidades especiais na escola."
            },
            {
                enunciado: "O Colégio Estadual Rio Branco possui sala de recursos multifuncionais (AEE) para atendimento educacional especializado?",
                alternativas: [
                    { texto: "Não possui", correta: false },
                    { texto: "Possui 1 sala", correta: false },
                    { texto: "Possui 2 salas", correta: false },
                    { texto: "Possui 3 ou mais salas", correta: true }
                ],
                explicacao: "A escola conta com uma sala de recursos multifuncionais equipada com materiais parcialmente adaptados e profissionais especializados."
            },
            {
                enunciado: "Quantos banheiros adaptados para pessoas com deficiência existem no Colégio Estadual Rio Branco?",
                alternativas: [
                    { texto: "Nenhum banheiro adaptado", correta: false },
                    { texto: "1 banheiro adaptado", correta: true },
                    { texto: "2 banheiros adaptados", correta: false },
                    { texto: "4 ou mais banheiros adaptados", correta: false }
                ],
                explicacao: "O colégio possui 1 banheiro adaptado."
            },
            {
                enunciado: "O Colégio Estadual Rio Branco oferece intérprete de Libras para alunos surdos ou com deficiência auditiva?",
                alternativas: [
                    { texto: "Não oferece", correta: false },
                    { texto: "Oferece, mas apenas em alguns horários", correta: true },
                    { texto: "Oferece em tempo integral", correta: false },
                    { texto: "Oferece apenas para provas", correta: false }
                ],
                explicacao: "A escola conta com um intérprete de Libras disponível em determinado horário para atender alunos surdos ou com deficiência auditiva."
            },
            {
                enunciado: "Qual a porcentagem aproximada de professores do Colégio Estadual Rio Branco que já participaram de formação em educação inclusiva?",
                alternativas: [
                    { texto: "Menos de 30%", correta: false },
                    { texto: "Entre 30% e 50%", correta: false },
                    { texto: "Entre 51% e 70%", correta: true },
                    { texto: "Mais de 80%", correta: false }
                ],
                explicacao: "Cerca de 65% dos professores já participaram de cursos e formações sobre educação inclusiva e acessibilidade."
            },
            {
                enunciado: "O Colégio Estadual Rio Branco possui sinalização tátil (piso podotátil) para auxiliar alunos com deficiência visual?",
                alternativas: [
                    { texto: "Não possui nenhuma sinalização tátil", correta: false },
                    { texto: "Possui apenas na entrada principal", correta: false },
                    { texto: "Possui em todos os corredores e áreas comuns", correta: true },
                    { texto: "Possui apenas nas escadas", correta: false }
                ],
                explicacao: "O colégio implementou piso podotátil em todos os corredores, rampas e áreas comuns para orientação de alunos com deficiência visual."
            },
            {
                enunciado: "Quantos elevadores adaptados existem no Colégio Estadual Rio Branco?",
                alternativas: [
                    { texto: "Nenhum elevador", correta: true },
                    { texto: "1 elevador", correta: false },
                    { texto: "2 elevadores", correta: false },
                    { texto: "3 ou mais elevadores", correta: false }
                ],
                explicacao: "O colégio não possui nenhum elevador adaptado."
            },
            {
                enunciado: "Qual a nota média que os alunos do Colégio Estadual Rio Branco dariam para a acessibilidade da escola (em uma escala de 0 a 10)?",
                alternativas: [
                    { texto: "0 a 4 (Ruim)", correta: false },
                    { texto: "5 a 6 (Regular)", correta: false },
                    { texto: "7 a 8 (Bom)", correta: true },
                    { texto: "9 a 10 (Excelente)", correta: false }
                ],
                explicacao: "Em pesquisa interna com os alunos, a acessibilidade da escola recebeu nota média 7.5, considerada boa, mas com pontos a melhorar."
            }
        ];

        let atual = 0;
        let pontuacao = 0;
        let respostasUsuario = [];
        let alternativaSelecionada = null;
        let jaRespondeu = false;

        const caixaPerguntas = document.getElementById('caixaPerguntas');
        const caixaAlternativas = document.getElementById('caixaAlternativas');
        const btnProximo = document.getElementById('btnProximo');
        const caixaResultado = document.getElementById('caixaResultado');
        const textoResultado = document.getElementById('textoResultado');
        const notaFinal = document.getElementById('notaFinal');
        const progressoBar = document.getElementById('progressoBar');
        const progressoBarWrapper = document.getElementById('progressoBarWrapper');
        const questaoNumero = document.getElementById('questaoNumero');
        const pontuacaoAtual = document.getElementById('pontuacaoAtual');
        const btnReiniciar = document.getElementById('btnReiniciar');

        const letras = ['A', 'B', 'C', 'D'];

        function mostraPergunta() {
            if (atual >= perguntas.length) {
                mostraResultado();
                return;
            }
            
            const perguntaAtual = perguntas[atual];
            caixaPerguntas.textContent = perguntaAtual.enunciado;
            questaoNumero.textContent = `Questão ${atual + 1}/${perguntas.length}`;
            pontuacaoAtual.textContent = `🎯 Acertos: ${pontuacao}`;
            
            caixaAlternativas.innerHTML = "";
            alternativaSelecionada = null;
            jaRespondeu = false;
            
            perguntaAtual.alternativas.forEach((alt, idx) => {
                const divAlternativa = document.createElement("div");
                divAlternativa.className = "alternativa";
                divAlternativa.dataset.indice = idx;
                divAlternativa.dataset.correta = alt.correta;
                divAlternativa.tabIndex = 0;
                divAlternativa.setAttribute("role", "button");
                divAlternativa.setAttribute("aria-label", `Alternativa ${letras[idx]}: ${alt.texto}`);
                
                const letraSpan = document.createElement("span");
                letraSpan.className = "alternativa-letra";
                letraSpan.textContent = letras[idx];
                letraSpan.setAttribute("aria-hidden", "true");
                
                const textoSpan = document.createElement("span");
                textoSpan.className = "alternativa-texto";
                textoSpan.textContent = alt.texto;
                
                divAlternativa.appendChild(letraSpan);
                divAlternativa.appendChild(textoSpan);
                
                divAlternativa.addEventListener("click", () => selecionarAlternativa(divAlternativa, idx));
                divAlternativa.addEventListener("keypress", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        selecionarAlternativa(divAlternativa, idx);
                    }
                });
                caixaAlternativas.appendChild(divAlternativa);
            });
            
            btnProximo.disabled = true;
            btnProximo.textContent = "VERIFICAR RESPOSTA →";
            
            const progresso = (atual / perguntas.length) * 100;
            progressoBar.style.width = `${progresso}%`;
            if (progressoBarWrapper) {
                progressoBarWrapper.setAttribute("aria-valuenow", progresso);
            }
        }

        function selecionarAlternativa(elemento, idx) {
            if (jaRespondeu) return;
            
            document.querySelectorAll('.alternativa').forEach(alt => {
                alt.classList.remove('selecionada');
                alt.setAttribute("aria-selected", "false");
            });
            
            elemento.classList.add('selecionada');
            elemento.setAttribute("aria-selected", "true");
            alternativaSelecionada = { elemento, idx };
            
            btnProximo.disabled = false;
            btnProximo.focus();
        }

        function verificarResposta() {
            if (!alternativaSelecionada || jaRespondeu) return;
            
            jaRespondeu = true;
            const perguntaAtual = perguntas[atual];
            const alternativa = perguntaAtual.alternativas[alternativaSelecionada.idx];
            const isCorreta = alternativa.correta;
            
            const feedbackDiv = document.createElement('div');
            feedbackDiv.className = `feedback ${isCorreta ? 'feedback-certo' : 'feedback-errado'}`;
            feedbackDiv.setAttribute("role", "status");
            feedbackDiv.setAttribute("aria-live", "polite");
            feedbackDiv.innerHTML = isCorreta ? 
                `✅ CORRETO! ${perguntaAtual.explicacao}` : 
                `❌ ERRADO! ${perguntaAtual.explicacao}`;
            
            const feedbackAntigo = document.querySelector('.feedback');
            if (feedbackAntigo) feedbackAntigo.remove();
            
            caixaAlternativas.appendChild(feedbackDiv);
            
            if (isCorreta) {
                alternativaSelecionada.elemento.classList.add('selecionada');
                pontuacao++;
                pontuacaoAtual.textContent = `🎯 Acertos: ${pontuacao}`;
            } else {
                alternativaSelecionada.elemento.classList.add('errada');
                const alternativasDivs = document.querySelectorAll('.alternativa');
                perguntaAtual.alternativas.forEach((alt, idx) => {
                    if (alt.correta && alternativasDivs[idx]) {
                        alternativasDivs[idx].style.border = "3px solid #48bb78";
                        alternativasDivs[idx].style.backgroundColor = "#f0fdf4";
                        alternativasDivs[idx].setAttribute("aria-label", `Alternativa correta: ${alt.texto}`);
                    }
                });
            }
            
            respostasUsuario.push({
                pergunta: perguntaAtual.enunciado,
                resposta: alternativa.texto,
                correta: isCorreta,
                explicacao: perguntaAtual.explicacao
            });
            
            document.querySelectorAll('.alternativa').forEach(alt => {
                alt.classList.add('disabled');
                alt.style.pointerEvents = 'none';
                alt.tabIndex = -1;
            });
            
            btnProximo.textContent = "PRÓXIMA QUESTÃO →";
        }

        function proximaQuestao() {
            if (!jaRespondeu && alternativaSelecionada) {
                verificarResposta();
                return;
            }
            
            if (!jaRespondeu) return;
            
            atual++;
            if (atual < perguntas.length) {
                mostraPergunta();
            } else {
                mostraResultado();
            }
        }

        function mostraResultado() {
            caixaPerguntas.style.display = 'none';
            caixaAlternativas.style.display = 'none';
            btnProximo.style.display = 'none';
            document.querySelector('.info-quiz').style.display = 'none';
            document.querySelector('.progresso').style.display = 'none';
            caixaResultado.style.display = 'block';
            
            const nota = (pontuacao / perguntas.length) * 10;
            const notaArredondada = nota.toFixed(1);
            
            let resultadoTexto = "📊 RELATÓRIO DE ACESSIBILIDADE - COLÉGIO RIO BRANCO 📊\n\n";
            resultadoTexto += `🎯 TOTAL DE ACERTOS: ${pontuacao}/${perguntas.length}\n`;
            resultadoTexto += `⭐ NOTA FINAL: ${notaArredondada}/10\n\n`;
            resultadoTexto += "═".repeat(50) + "\n\n";
            
            respostasUsuario.forEach((item, idx) => {
                resultadoTexto += `${idx + 1}. ${item.correta ? "✅" : "❌"} ${item.pergunta}\n`;
                resultadoTexto += `   📝 Sua resposta: ${item.resposta}\n`;
                resultadoTexto += `   💡 ${item.explicacao}\n\n`;
            });
            
            textoResultado.textContent = resultadoTexto;
            
            let mensagemNota = "";
            let emoji = "";
            if (notaArredondada >= 9) {
                emoji = "🏆 PARABÉNS! 🏆";
                mensagemNota = "Você conhece muito bem a realidade da acessibilidade no Colégio Rio Branco! Continue sendo um agente de inclusão!";
            } else if (notaArredondada >= 7) {
                emoji = "👍 BOM TRABALHO! 👍";
                mensagemNota = "Você tem um bom conhecimento sobre acessibilidade, mas ainda pode aprender mais sobre o tema!";
            } else if (notaArredondada >= 5) {
                emoji = "📚 QUE TAL CONHECER MAIS? 📚";
                mensagemNota = "Visite a sala de recursos e converse com a equipe de inclusão da escola para saber mais!";
            } else {
                emoji = "⚠️ PRECISA DE ATENÇÃO ⚠️";
                mensagemNota = "A acessibilidade é um direito de todos! Procure se informar mais sobre o tema na sua escola.";
            }
            
            notaFinal.innerHTML = `${emoji}<br><span style="font-size: 2rem;">${notaArredondada}/10</span><br><span style="font-size: 1rem;">${mensagemNota}</span>`;
        }

        function reiniciarQuiz() {
            atual = 0;
            pontuacao = 0;
            respostasUsuario = [];
            alternativaSelecionada = null;
            jaRespondeu = false;
            
            caixaPerguntas.style.display = 'block';
            caixaAlternativas.style.display = 'flex';
            btnProximo.style.display = 'block';
            document.querySelector('.info-quiz').style.display = 'flex';
            document.querySelector('.progresso').style.display = 'block';
            caixaResultado.style.display = 'none';
            
            mostraPergunta();
        }

        btnProximo.addEventListener('click', proximaQuestao);
        btnReiniciar.addEventListener('click', reiniciarQuiz);
        
        const horas = document.getElementById('horas');
        const minutos = document.getElementById('minutos');
        const segundos = document.getElementById('segundos');

        setInterval(function time() {
            let dateToday = new Date();
            let hr = dateToday.getHours();
            let min = dateToday.getMinutes();
            let s = dateToday.getSeconds();

            if (hr < 10) hr = '0' + hr;
            if (min < 10) min = '0' + min;
            if (s < 10) s = '0' + s;

            horas.textContent = hr;
            minutos.textContent = min;
            segundos.textContent = s;
        }, 1000);

        mostraPergunta();
    </script>
</body>
</html>
